<!DOCTYPE html>
<html lang="{{ ui_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailMindHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo"><span class="logo-brand">Mail</span>Mind<span class="logo-brand">Hub</span></div>
      <h1 class="login-title">Login</h1>
      <form method="post" action="/login">
        <div class="form-group">
          <label for="password">{{ t.login_placeholder }}</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autofocus autocomplete="current-password">
        </div>
        {% if error %}
        <div class="feedback err">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn" style="width: 100%;">{{ t.login_btn }}</button>
      </form>
      <div class="login-lang" style="text-align: center; font-size: 10px; margin-top: 16px;">
        <a href="/lang/zh" style="color: var(--muted); text-decoration: none; margin: 0 6px;">中文</a>
        <a href="/lang/ja" style="color: var(--muted); text-decoration: none; margin: 0 6px;">日本語</a>
        <a href="/lang/ko" style="color: var(--muted); text-decoration: none; margin: 0 6px;">한국어</a>
        <a href="/lang/en" style="color: var(--muted); text-decoration: none; margin: 0 6px;">English</a>
      </div>
    </div>
  </div>
</body>
</html>
