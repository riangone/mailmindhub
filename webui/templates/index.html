<!DOCTYPE html>
<html lang="{{ ui_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailMindHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js" defer></script>
</head>
<body>

<header>
  <div class="logo">MAILMIND</div>
  {% include "partials/header_status.html" %}
  <div class="lang-switch">
    <a href="/lang/zh" class="{{ 'active' if ui_lang == 'zh' else '' }}">中</a>
    <a href="/lang/ja" class="{{ 'active' if ui_lang == 'ja' else '' }}">日</a>
    <a href="/lang/ko" class="{{ 'active' if ui_lang == 'ko' else '' }}">한</a>
    <a href="/lang/en" class="{{ 'active' if ui_lang == 'en' else '' }}">EN</a>
  </div>
</header>

<nav>
  <button class="tab active"
          hx-get="/tabs/mail"
          hx-target="#content"
          hx-swap="innerHTML"
          onclick="setTab(this)">{{ t.nav_mail }}</button>
  <button class="tab"
          hx-get="/tabs/ai"
          hx-target="#content"
          hx-swap="innerHTML"
          onclick="setTab(this)">{{ t.nav_ai }}</button>
  <button class="tab"
          hx-get="/tabs/tasks"
          hx-target="#content"
          hx-swap="innerHTML"
          onclick="setTab(this)">{{ t.nav_tasks }}</button>
  <button class="tab"
          hx-get="/tabs/skills"
          hx-target="#content"
          hx-swap="innerHTML"
          onclick="setTab(this)">{{ t.nav_skills }}</button>
  <button class="tab"
          hx-get="/tabs/logs"
          hx-target="#content"
          hx-swap="innerHTML"
          onclick="setTab(this)">{{ t.nav_logs }}</button>
</nav>

<main>
  <div id="content">
    {% include "partials/tab_mail.html" %}
  </div>
</main>

<script>
  function setTab(el) {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.remove('active');
    });
    el.classList.add('active');
  }

  // Auto-scroll log panel when new SSE messages arrive
  document.addEventListener('htmx:sseMessage', function(evt) {
    var wrap = document.getElementById('log-wrap');
    if (wrap) {
      wrap.scrollTop = wrap.scrollHeight;
    }
  });
</script>

</body>
</html>
