<div id="header-status"
     hx-get="/partials/header_status"
     hx-trigger="every 5s"
     hx-swap="outerHTML">
  <div class="hs-info">
    <span class="dot {{ 'on' if status.running else 'off' }}"></span>
    <span class="hs-text">
      {% if status.running %}
        PID:{{ status.pid }}&nbsp;·&nbsp;{{ status.mailbox }}&nbsp;·&nbsp;{{ status.ai }}&nbsp;·&nbsp;{{ status.mode.upper() }}
      {% else %}STOPPED{% endif %}
    </span>
  </div>
  <div class="hs-actions">
    <button class="ab" title="启动" hx-post="/daemon/start" hx-target="#header-status" hx-swap="outerHTML">▶</button>
    <button class="ab" title="停止" hx-post="/daemon/stop" hx-target="#header-status" hx-swap="outerHTML">■</button>
    <button class="ab" title="重启" hx-post="/daemon/restart" hx-target="#header-status" hx-swap="outerHTML">↺</button>
  </div>
  {% if message %}
  <div class="hs-msg {{ 'ok' if success else 'er' }}">{{ message }}</div>
  {% endif %}
</div>
