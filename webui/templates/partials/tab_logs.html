<div class="tab-body">
  <div class="log-header">
    <span class="log-title">{{ t.logs_title }}</span>
    <button class="btn-sm" onclick="document.getElementById('log-content').innerHTML=''">{{ t.logs_clear }}</button>
  </div>
  <div id="log-wrap" hx-ext="sse" sse-connect="/logs/stream">
    <div id="log-content" sse-swap="message" hx-swap="afterbegin">
      {{ initial_log_html | default('', true) | safe }}
    </div>
  </div>
</div>

<script>
(function () {
  var wrap = document.getElementById('log-wrap');
  if (!wrap) return;
  // 初期表示は最上部（最新ログ）に固定
  wrap.scrollTop = 0;
  // SSE で afterbegin 挿入されても最上部を維持
  document.body.addEventListener('htmx:afterSwap', function (evt) {
    if (evt.detail && evt.detail.target && evt.detail.target.id === 'log-content') {
      wrap.scrollTop = 0;
    }
  });
})();
</script>
